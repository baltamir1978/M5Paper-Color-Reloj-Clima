; ============================================================================
;  PlatformIO - M5Paper Color (ESP32-S3) - compilacion reproducible
; ============================================================================
;  Versiones FIJADAS (probadas OK, junio 2026). La placa es muy nueva y las
;  librerias se actualizan rapido estos primeros meses: este archivo congela
;  exactamente lo que funciona. Para Arduino IDE no hace falta (ver README),
;  pero con PlatformIO compila sin pelearse con el gestor de librerias:
;     pio run            (compilar)
;     pio run -t upload  (subir)
;     pio device monitor (monitor serie)
;
;  Arduino-ESP32 3.x NO esta en la plataforma oficial "espressif32" de PlatformIO;
;  se usa el fork de la comunidad "pioarduino". El tag 55.03.37 = arduino-esp32 3.3.7
;  (mismo core que el paquete m5stack 3.3.7 con el que se ha probado).
; ============================================================================

[platformio]
src_dir = M5PaperColor_Reloj          ; el .ino y tvbgone_codes.h estan aqui

[env:m5papercolor]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1            ; ESP32-S3 generico (no hay board oficial del PaperColor todavia)
framework = arduino

; --- Memoria: 16MB flash (QIO) + 8MB PSRAM (OPI) ---
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
; CORE_DEBUG_LEVEL: en Arduino IDE lo pone el menu "Core Debug Level"; aqui hay que
; definirlo a mano porque ESP32-audioI2S/Audio.h lo usa. 0=None (sube a 3 para mas log).
; ARDUINO_USB_CDC_ON_BOOT/USB_MODE: Serial por el USB nativo del S3 (en Arduino IDE seria
; "USB CDC On Boot: Enabled" + "USB Mode: Hardware CDC and JTAG"). Sin esto el serie no sale en PlatformIO.
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

monitor_speed = 115200
upload_speed = 1500000

; --- Librerias con versiones EXACTAS (tested OK) ---
lib_deps =
    m5stack/M5Unified@0.2.17
    m5stack/M5GFX@0.2.22
    m5stack/M5Unit-ENV@1.4.0
    bblanchon/ArduinoJson@7.4.3
    crankyoldgit/IRremoteESP8266@2.9.0
    ; Estas dos pueden no estar en el registro de PlatformIO -> se fijan por tag de git.
    ; Si el tag no existiera con ese nombre, mira los releases del repo y ajusta (#vX.Y.Z).
    https://github.com/m5stack/M5PM1.git#1.0.7
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.4.6
